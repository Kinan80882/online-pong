<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PONG - Atari 1972</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: #000;
      color: #fff;
      font-family: 'Orbitron', monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    canvas {
      border: 4px solid #fff;
      background: #000;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }
    
    .hud {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 4px;
      text-shadow: 2px 2px 0 #000;
      z-index: 10;
    }
    
    .player-score { color: #00ff41 !important; }
    .cpu-score { color: #ff0040 !important; margin-left: 40px; }
    
    .ui {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
    }
    
    button {
      background: #000;
      color: #fff;
      border: 2px solid #fff;
      padding: 10px 20px;
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button:hover { background: #fff; color: #000; }
    
    .game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.95);
      border: 3px solid #fff;
      padding: 40px;
      text-align: center;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 3px;
      display: none;
    }
    
    @media (max-width: 600px) {
      canvas { width: 95vw; height: 50vh; }
      .hud { font-size: 20px; }
    }
  </style>
</head>
<body>
  <canvas id="pongCanvas" width="800" height="600"></canvas>
  
  <div class="hud">
    <span class="player-score" id="playerScore">0</span>
    <span class="cpu-score" id="cpuScore">0</span>
  </div>
  
  <div class="ui">
    <button onclick="startGame()">START</button>
    <button onclick="pauseGame()">PAUSE</button>
    <button onclick="resetGame()">RESET</button>
  </div>
  
  <div class="game-over" id="gameOver">
    <div id="winnerText">GAME OVER</div>
    <div style="font-size: 18px; margin: 20px 0;">FINAL: <span id="finalScore">0 - 0</span></div>
    <button onclick="resetGame()">NEW GAME</button>
  </div>

  <script>
    const canvas = document.getElementById('pongCanvas');
    const ctx = canvas.getContext('2d');
    
    // Configuración ORIGINAL Atari Pong (proporciones exactas)
    const PADDLE_WIDTH = 10;
    const PADDLE_HEIGHT = 100;
    const BALL_SIZE = 10;
    const FIELD_WIDTH = 800;
    const FIELD_HEIGHT = 600;
    
    // Estado del juego
    let gameState = {
      player: { x: 30, y: (FIELD_HEIGHT - PADDLE_HEIGHT) / 2, score: 0 },
      cpu: { x: FIELD_WIDTH - 40, y: (FIELD_HEIGHT - PADDLE_HEIGHT) / 2, score: 0 },
      ball: { x: FIELD_WIDTH / 2, y: FIELD_HEIGHT / 2, vx: 0, vy: 0, size: BALL_SIZE },
      gameRunning: false,
      gamePaused: true,
      gameOver: false,
      keys: {},
      paddleSpeed: 7,
      ballSpeed: 4
    };
    
    // Sonidos 8-bit originales
    function beep(frequency, duration) {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      oscillator.frequency.value = frequency;
      oscillator.type = 'square';
      
      gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      
      oscillator.start(audioCtx.currentTime);
      oscillator.stop(audioCtx.currentTime + duration);
    }
    
    // Controles originales (W/S)
    document.addEventListener('keydown', (e) => {
      gameState.keys[e.key.toLowerCase()] = true;
    });
    
    document.addEventListener('keyup', (e) => {
      gameState.keys[e.key.toLowerCase()] = false;
    });
    
    // Update jugador (W/S)
    function updatePlayer() {
      if (gameState.keys['w'] && gameState.player.y > 0) {
        gameState.player.y -= gameState.paddleSpeed;
      }
      if (gameState.keys['s'] && gameState.player.y < FIELD_HEIGHT - PADDLE_HEIGHT) {
        gameState.player.y += gameState.paddleSpeed;
      }
    }
    
    // CPU original (predicción + error humano)
    function updateCPU() {
      const centerY = gameState.cpu.y + PADDLE_HEIGHT / 2;
      const ballCenterY = gameState.ball.y;
      const predictionError = (Math.random() - 0.5) * 20; // "Humano"
      
      if (centerY < ballCenterY + predictionError) {
        gameState.cpu.y += Math.min(5, (ballCenterY - centerY) * 0.1);
      } else if (centerY > ballCenterY + predictionError) {
        gameState.cpu.y -= Math.min(5, (centerY - ballCenterY) * 0.1);
      }
      
      gameState.cpu.y = Math.max(0, Math.min(FIELD_HEIGHT - PADDLE_HEIGHT, gameState.cpu.y));
    }
    
    // Física bola ORIGINAL (ángulos precisos)
    function updateBall() {
      gameState.ball.x += gameState.ball.vx;
      gameState.ball.y += gameState.ball.vy;
      
      // Rebote techo/suelo
      if (gameState.ball.y <= 0 || gameState.ball.y >= FIELD_HEIGHT) {
        gameState.ball.vy *= -1;
        beep(220, 0.05);
      }
      
      // Colisión jugador (lado izquierdo)
      if (gameState.ball.x - gameState.ball.size/2 <= gameState.player.x + PADDLE_WIDTH &&
          gameState.ball.x + gameState.ball.size/2 >= gameState.player.x &&
          gameState.ball.y > gameState.player.y && gameState.ball.y < gameState.player.y + PADDLE_HEIGHT) {
        
        gameState.ball.vx *= -1;
        // Ángulo basado en dónde golpea la paleta
        const hitPos = (gameState.ball.y - (gameState.player.y + PADDLE_HEIGHT/2)) / (PADDLE_HEIGHT/2);
        gameState.ball.vy = hitPos * gameState.ballSpeed;
        beep(440, 0.06);
      }
      
      // Colisión CPU (lado derecho)
      if (gameState.ball.x + gameState.ball.size/2 >= gameState.cpu.x &&
          gameState.ball.x - gameState.ball.size/2 <= gameState.cpu.x + PADDLE_WIDTH &&
          gameState.ball.y > gameState.cpu.y && gameState.ball.y < gameState.cpu.y + PADDLE_HEIGHT) {
        
        gameState.ball.vx *= -1;
        const hitPos = (gameState.ball.y - (gameState.cpu.y + PADDLE_HEIGHT/2)) / (PADDLE_HEIGHT/2);
        gameState.ball.vy = hitPos * gameState.ballSpeed;
        beep(440, 0.06);
      }
      
      // Gol (puntuación)
      if (gameState.ball.x < 0) {
        gameState.cpu.score++;
        resetBall(true);
        beep(110, 0.15);
      } else if (gameState.ball.x > FIELD_WIDTH) {
        gameState.player.score++;
        resetBall(false);
        beep(880, 0.15);
      }
      
      updateUI();
      checkWin();
    }
    
    function resetBall(playerScored) {
      gameState.ball.x = FIELD_WIDTH / 2;
      gameState.ball.y = FIELD_HEIGHT / 2;
      gameState.ball.vx = (playerScored ? 1 : -1) * gameState.ballSpeed;
      gameState.ball.vy = (Math.random() - 0.5) * 3;
    }
    
    function checkWin() {
      if (gameState.player.score >= 11 || gameState.cpu.score >= 11) {
        gameState.gameOver = true;
        const gameOverEl = document.getElementById('gameOver');
        gameOverEl.style.display = 'block';
        document.getElementById('winnerText').textContent = 
          gameState.player.score >= 11 ? 'PLAYER WINS!' : 'CPU WINS!';
        document.getElementById('finalScore').textContent = 
          `${gameState.player.score} - ${gameState.cpu.score}`;
      }
    }
    
    function updateUI() {
      document.getElementById('playerScore').textContent = gameState.player.score;
      document.getElementById('cpuScore').textContent = gameState.cpu.score;
    }
    
    // Render PIXEL PERFECT (como Atari)
    function draw() {
      // Limpiar con flicker TV effect
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, FIELD_WIDTH, FIELD_HEIGHT);
      
      // Línea central punteada (estilo Pong)
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.setLineDash([20, 20]);
      ctx.beginPath();
      ctx.moveTo(FIELD_WIDTH/2, 20);
      ctx.lineTo(FIELD_WIDTH/2, FIELD_HEIGHT - 20);
      ctx.stroke();
      ctx.setLineDash([]);
      
      // Paleta jugador (verde original)
      ctx.fillStyle = '#00ff41';
      ctx.fillRect(gameState.player.x, gameState.player.y, PADDLE_WIDTH, PADDLE_HEIGHT);
      
      // Paleta CPU (rojo original)
      ctx.fillStyle = '#ff0040';
      ctx.fillRect(gameState.cpu.x, gameState.cpu.y, PADDLE_WIDTH, PADDLE_HEIGHT);
      
      // Bola blanca clásica
      ctx.fillStyle = '#fff';
      ctx.fillRect(gameState.ball.x - gameState.ball.size/2, 
                   gameState.ball.y - gameState.ball.size/2, 
                   gameState.ball.size, gameState.ball.size);
    }
    
    // Game Loop 60fps
    function gameLoop() {
      if (gameState.gameRunning && !gameState.gamePaused && !gameState.gameOver) {
        updatePlayer();
        updateCPU();
        updateBall();
      }
      draw();
      requestAnimationFrame(gameLoop);
    }
    
    // Controles UI
    function startGame() {
      gameState.gameRunning = true;
      gameState.gamePaused = false;
      gameState.gameOver = false;
      document.getElementById('gameOver').style.display = 'none';
      resetBall(true);
    }
    
    function pauseGame() {
      gameState.gamePaused = !gameState.gamePaused;
    }
    
    function resetGame() {
      gameState.player.score = 0;
      gameState.cpu.score = 0;
      gameState.gamePaused = true;
      gameState.gameOver = false;
      gameState.gameRunning = false;
      resetBall(true);
      updateUI();
      document.getElementById('gameOver').style.display = 'none';
    }
    
    // Responsive
    function resize() {
      const scale = Math.min(window.innerWidth / FIELD_WIDTH, window.innerHeight / FIELD_HEIGHT) * 0.9;
      canvas.style.width = FIELD_WIDTH * scale + 'px';
      canvas.style.height = FIELD_HEIGHT * scale + 'px';
    }
    
    window.addEventListener('resize', resize);
    resize();
    
    // ¡PONG ATARI LISTO!
    updateUI();
    gameLoop();
  </script>
</body>
</html>
