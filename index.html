<!-- Pong game -->

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PONG</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', 'OCR A Std', monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: bold;
    }
    
    canvas {
      border: 4px solid #fff;
      background: #000;
      /* Pixel perfect como TV CRT antigua */
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }
    
    .hud {
      position: absolute;
      top: 40px;
      width: 100%;
      text-align: center;
      font-size: 48px;
      letter-spacing: 8px;
      text-shadow: 0 0 10px #fff;
    }
    
    .ui {
      position: absolute;
      bottom: 40px;
      width: 100%;
      text-align: center;
    }
    
    button {
      background: #000;
      color: #fff;
      border: 2px solid #fff;
      padding: 12px 24px;
      font-family: inherit;
      font-size: 18px;
      margin: 0 10px;
      cursor: pointer;
    }
    
    button:hover {
      background: #fff;
      color: #000;
    }
    
    .game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #000;
      border: 4px solid #fff;
      padding: 40px;
      text-align: center;
      font-size: 36px;
      letter-spacing: 6px;
      display: none;
    }
    
    @media (max-width: 600px) {
      .hud { font-size: 32px; letter-spacing: 4px; }
      canvas { width: 95vw; height: 60vh; }
    }
  </style>
</head>
<body>
  <canvas id="pongCanvas" width="800" height="600"></canvas>
  
  <div class="hud">
    <span id="playerScore">0</span>  <span id="cpuScore">0</span>
  </div>
  
  <div class="ui">
    <button onclick="startGame()">START</button>
    <button onclick="pauseGame()">PAUSE</button>
    <button onclick="resetGame()">RESET</button>
  </div>
  
  <div class="game-over" id="gameOver">
    <div id="winnerText">GAME OVER</div>
    <div style="font-size: 24px; margin: 20px 0; letter-spacing: 4px;">
      <span id="finalScore">0 - 0</span>
    </div>
    <button onclick="resetGame()">NEW GAME</button>
  </div>

  <script>
    const canvas = document.getElementById('pongCanvas');
    const ctx = canvas.getContext('2d');
    
    // Dimensiones ORIGINALES Pong 1972
    const WIDTH = 800;
    const HEIGHT = 600;
    const PADDLE_W = 12;
    const PADDLE_H = 100;
    const BALL_SIZE = 12;
    
    let state = {
      player: { x: 30, y: 250, score: 0 },
      cpu: { x: WIDTH - 42, y: 250, score: 0 },
      ball: { x: WIDTH/2, y: HEIGHT/2, vx: 0, vy: 0 },
      running: false,
      paused: true,
      over: false,
      keys: {}
    };
    
    // Controles W/S
    document.addEventListener('keydown', e => state.keys[e.key.toLowerCase()] = true);
    document.addEventListener('keyup', e => state.keys[e.key.toLowerCase()] = false);
    
    function updatePlayer() {
      if (state.keys.w && state.player.y > 0) state.player.y -= 8;
      if (state.keys.s && state.player.y < HEIGHT - PADDLE_H) state.player.y += 8;
    }
    
    function updateCPU() {
      const targetY = state.ball.y - PADDLE_H/2;
      const diff = targetY - state.cpu.y;
      state.cpu.y += Math.max(-6, Math.min(6, diff * 0.12));
      state.cpu.y = Math.max(0, Math.min(HEIGHT - PADDLE_H, state.cpu.y));
    }
    
    function updateBall() {
      state.ball.x += state.ball.vx;
      state.ball.y += state.ball.vy;
      
      // Paredes
      if (state.ball.y <= 0 || state.ball.y >= HEIGHT) {
        state.ball.vy *= -1;
      }
      
      // Player collision
      if (state.ball.x <= state.player.x + PADDLE_W &&
          state.ball.x >= state.player.x &&
          state.ball.y >= state.player.y &&
          state.ball.y <= state.player.y + PADDLE_H) {
        state.ball.vx = Math.abs(state.ball.vx);
        state.ball.vy = (state.ball.y - (state.player.y + PADDLE_H/2)) * 0.3;
      }
      
      // CPU collision  
      if (state.ball.x >= state.cpu.x - PADDLE_W &&
          state.ball.x <= state.cpu.x &&
          state.ball.y >= state.cpu.y &&
          state.ball.y <= state.cpu.y + PADDLE_H) {
        state.ball.vx = -Math.abs(state.ball.vx);
        state.ball.vy = (state.ball.y - (state.cpu.y + PADDLE_H/2)) * 0.3;
      }
      
      // Score
      if (state.ball.x < 0) {
        state.cpu.score++;
        resetBall();
      } else if (state.ball.x > WIDTH) {
        state.player.score++;
        resetBall();
      }
    }
    
    function resetBall() {
      state.ball.x = WIDTH/2;
      state.ball.y = HEIGHT/2;
      state.ball.vx = (Math.random() < 0.5 ? -4 : 4);
      state.ball.vy = (Math.random() - 0.5) * 4;
    }
    
    function checkWin() {
      if (state.player.score >= 11 || state.cpu.score >= 11) {
        state.over = true;
        document.getElementById('gameOver').style.display = 'block';
        document.getElementById('winnerText').textContent = 
          state.player.score >= 11 ? 'PLAYER WINS' : 'CPU WINS';
        document.getElementById('finalScore').textContent = 
          `${state.player.score} - ${state.cpu.score}`;
      }
    }
    
    function updateUI() {
      document.getElementById('playerScore').textContent = state.player.score;
      document.getElementById('cpuScore').textContent = state.cpu.score;
    }
    
    // RENDER EXACTO PONG 1972 - TODO BLANCO/NEGRO
    function render() {
      // Fondo negro
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);
      
      // Línea central (BLANCA punteada)
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.setLineDash([25, 25]);
      ctx.beginPath();
      ctx.moveTo(WIDTH/2, 20);
      ctx.lineTo(WIDTH/2, HEIGHT-20);
      ctx.stroke();
      ctx.setLineDash([]);
      
      // Paletas BLANCAS
      ctx.fillStyle = '#fff';
      ctx.fillRect(state.player.x, state.player.y, PADDLE_W, PADDLE_H);
      ctx.fillRect(state.cpu.x, state.cpu.y, PADDLE_W, PADDLE_H);
      
      // Bola BLANCA
      ctx.fillRect(state.ball.x - BALL_SIZE/2, state.ball.y - BALL_SIZE/2, BALL_SIZE, BALL_SIZE);
      
      // Bordes campo BLANCOS
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 6;
      ctx.strokeRect(8, 8, WIDTH-16, HEIGHT-16);
    }
    
    function loop() {
      if (state.running && !state.paused && !state.over) {
        updatePlayer();
        updateCPU();
        updateBall();
        checkWin();
      }
      render();
      requestAnimationFrame(loop);
    }
    
    // Controles
    function startGame() {
      state.running = true;
      state.paused = false;
      state.over = false;
      document.getElementById('gameOver').style.display = 'none';
      resetBall();
    }
    
    function pauseGame() { state.paused = !state.paused; }
    
    function resetGame() {
      state.player.score = state.cpu.score = 0;
      state.paused = state.over = state.running = false;
      resetBall();
      updateUI();
      document.getElementById('gameOver').style.display = 'none';
    }
    
    // Responsive
    function resize() {
      const scale = Math.min(window.innerWidth/800, window.innerHeight/700) * 0.95;
      canvas.style.width = 800 * scale + 'px';
      canvas.style.height = 600 * scale + 'px';
    }
    
    window.addEventListener('resize', resize);
    resize();
    
    updateUI();
    loop();
  </script>
</body>
</html>
